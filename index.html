<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pointeuse Travail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f766e">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>
    <main class="app-wrap">

        <div id="view-main">

            <section class="card p-3 mb-3">
                <h1 class="h5 mb-3 text-center title">Mon Suivi d'Heures</h1>
                <div class="row g-2 text-center">
                    <div class="col-6">
                        <div class="stat">
                            <div class="small text-muted">Cette semaine</div>
                            <strong id="statWeek" class="fs-5">00:00</strong>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat">
                            <div class="small text-muted">Ce mois</div>
                            <strong id="statMonth" class="fs-5">00:00</strong>
                        </div>
                    </div>
                    <div class="col-12 mt-2">
                        <div class="stat bg-brand text-white" style="background: var(--brand); border:none;">
                            <div class="small opacity-75">Objectif 507h - Reste à faire</div>
                            <strong id="statRemaining507" class="fs-2 text-white">507:00</strong>
                        </div>
                    </div>
                </div>
            </section>

            <section class="card p-3 mb-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <button id="btnPrevMonth" class="btn btn-outline-secondary btn-sm">&larr; Préc</button>
                    <h2 id="currentMonthLabel" class="h6 mb-0 text-capitalize fw-bold">Juin 2026</h2>
                    <button id="btnNextMonth" class="btn btn-outline-secondary btn-sm">Suiv &rarr;</button>
                </div>

                <div class="calendar-header d-flex text-center small fw-bold text-muted mb-2">
                    <div class="flex-fill">Lun</div>
                    <div class="flex-fill">Mar</div>
                    <div class="flex-fill">Mer</div>
                    <div class="flex-fill">Jeu</div>
                    <div class="flex-fill">Ven</div>
                    <div class="flex-fill">Sam</div>
                    <div class="flex-fill">Dim</div>
                </div>

                <div id="calendarGrid" class="calendar-grid">
                </div>
            </section>

            <section class="d-flex flex-wrap gap-2 justify-content-center pb-4">
                <button id="btnExportJson" class="btn btn-outline-secondary btn-sm">Sauvegarde JSON</button>
                <button id="btnExportCsv" class="btn btn-outline-secondary btn-sm">Export CSV / Excel</button>
            </section>
        </div>


        <div id="view-form" class="d-none">
            <section class="card p-3 mb-3">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <button id="btnBackToCalendar" class="btn btn-outline-secondary btn-sm">&larr; Retour</button>
                    <h2 id="formDateLabel" class="h5 mb-0 title">Date sélectionnée</h2>
                    <div style="width: 60px;"></div>
                </div>

                <h3 class="h6 mb-2 text-brand">Temps de travail</h3>
                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <label class="form-label small">Prise de poste</label>
                        <input type="time" id="entryStart" class="form-control">
                    </div>
                    <div class="col-6">
                        <label class="form-label small">Fin de service</label>
                        <input type="time" id="entryEnd" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label small">Coupure / Pause (en minutes)</label>
                        <input type="number" id="entryPause" min="0" value="0" class="form-control">
                    </div>
                </div>

                <h3 class="h6 mb-2 text-brand">Intervention</h3>
                <div class="mb-4">
                    <label class="form-label small">Adresse du lieu</label>
                    <input type="text" id="entryLocation" class="form-control" placeholder="Ex: Studio 4, Paris...">
                </div>

                <h3 class="h6 mb-2 text-brand">Frais annexes</h3>
                <div class="mb-4">
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="checkRepas">
                        <label class="form-check-label" for="checkRepas">Frais de Repas</label>
                    </div>
                    <div id="wrapRepasComment" class="mb-3 d-none">
                        <input type="text" id="commentRepas" class="form-control form-control-sm"
                            placeholder="Commentaire / Montant (Repas)...">
                    </div>

                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="checkPeage">
                        <label class="form-check-label" for="checkPeage">Frais de Péage / Transport</label>
                    </div>
                    <div id="wrapPeageComment" class="mb-3 d-none">
                        <input type="text" id="commentPeage" class="form-control form-control-sm"
                            placeholder="Commentaire / Montant (Péage)...">
                    </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button id="btnSaveDay" class="btn btn-brand btn-lg">Enregistrer cette journée</button>
                    <button id="btnDeleteDay" class="btn btn-outline-danger">Supprimer la saisie</button>
                </div>
            </section>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        // Enregistrement du Service Worker pour le mode hors ligne
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((reg) => console.log('Service Worker enregistré avec succès !'))
                    .catch((err) => console.error('Erreur Service Worker :', err));
            });
        }
    </script>
</body>

</html>
